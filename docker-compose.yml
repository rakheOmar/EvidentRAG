services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evidentrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evidentrag}
      POSTGRES_DB: ${POSTGRES_DB:-evidentrag}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evidentrag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      APP_ENV: production
      CLIENT_DIST_PATH: client/dist
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_STORAGE_PATH: /app/data/documents
    volumes:
      - ./corpus:/app/corpus:ro
      - document_storage:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: uv run arq app.worker.WorkerSettings
    env_file:
      - path: .env.docker
        required: false
    environment:
      APP_ENV: production
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_STORAGE_PATH: /app/data/documents
    volumes:
      - ./corpus:/app/corpus:ro
      - document_storage:/app/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    profiles:
      - dev
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_storage:
  document_storage:
