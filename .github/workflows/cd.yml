name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        id: names
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=${REGISTRY}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "worker=${REGISTRY}/${REPO_LC}-worker" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (API + client)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.names.outputs.backend }}:${{ github.ref_name }}
            ${{ steps.names.outputs.backend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.names.outputs.worker }}:${{ github.ref_name }}
            ${{ steps.names.outputs.worker }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
